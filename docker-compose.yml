version: '3.8'

services:
  mysql:
    image: mysql:latest
    volumes:
      - ./docker_files/mysql/data:/var/lib/mysql
      - ./docker_files/mysql/sql_command:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_app
      MYSQL_USER: dbapp
      MYSQL_PASSWORD: root@3927
    ports:
      - "3306:3306"
    networks:
      - php_dev-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: SERVER-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8099:80"
    depends_on:
      - mysql
    networks:
      - php_dev-network

  apache_php:
    build:
      context: .
      dockerfile: ./docker_files/php/Dockerfile
    image: ubuntu_apache_php81_mysql:latest
    container_name: ubuntu_apache_php81_mysql
    ports:
      - "8085:80"
    networks:
      - php_dev-network
    volumes:
      - ./:/var/www/html:rw
      - ./logs:/var/log/apache2:rw
    depends_on:
      - mysql

networks:
  php_dev-network:
    driver: bridge
